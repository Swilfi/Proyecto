<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="estilos.css">
    <title>Control de Asistencia</title>
    <style>
        .nav-header {
            max-width: 1000px;
            margin: 0 auto 15px auto;
            display: flex;
            justify-content: flex-start;
        }
        .btn-volver-link {
            text-decoration: none;
            color: #3db1ab; 
            font-weight: 600;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: opacity 0.2s;
        }
        .btn-volver-link:hover { opacity: 0.7; }

        /* Estilos para los nuevos selectores */
        .filtros-asistencia {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .select-moderno {
            border: 1px solid #ddd;
            padding: 8px 12px;
            border-radius: 8px;
            color: #4a4a4a;
            font-family: inherit;
            cursor: pointer;
            outline: none;
        }
        .select-moderno:focus { border-color: #3db1ab; }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="nav-header">
            <a href="../index.html" class="btn-volver-link">
                <span>←</span> Volver al Panel Principal
            </a>
        </div>

        <div class="asistencia-card">
            
            <div class="card-header" style="display: flex; justify-content: space-between; align-items: center; padding: 20px 30px;">
    <div class="header-info">
        <h1 style="margin: 0; font-size: 1.4rem; color: #2c3e50;">Control de Asistencia</h1>
        <p style="margin: 4px 0 0; color: #888; font-size: 0.9rem;">Registro diario y acumulativo de estudiantes</p>
    </div>
    
    <div class="header-action">
        <div class="filtros-asistencia">
            <select id="selectAnoEscolar" class="select-moderno">
                <option value="" disabled selected>Año Escolar</option>
                <option value="2022-2023">2022-2023</option>
                <option value="2023-2024">2023-2024</option>
                <option value="2024-2025">2024-2025</option>
                <option value="2025-2026">2025-2026</option>
            </select>

            <select id="selectGrado" class="select-moderno">
                <option value="" disabled selected>Grado</option>
                <option value="1°">1°</option>
                <option value="2°">2°</option>
                <option value="3°">3°</option>
                <option value="4°">4°</option>
                <option value="5°">5°</option>
                <option value="6°">6°</option>
            </select>

            <select id="selectSeccion" class="select-moderno">
                <option value="" disabled selected>Sección</option>
                <option value="A">A</option>
                <option value="B">B</option>
                <option value="C">C</option>
            </select>

                <input type="date" id="fechaAsistencia" class="input-fecha-moderno">
            </div>
        </div>
    </div>

            <div class="card-body">
                <table class="tabla-moderna">
                    <thead>
                        <tr>
                            <th>Estudiante</th>
                            <th class="text-center">Total Asistencias</th>
                            <th class="text-center">Total Inasistencias</th>
                            <th class="text-center">Acción de Hoy</th>
                        </tr>
                    </thead>
                    <tbody id="listaEstudiantes">
                        </tbody>
                </table>
            </div>

            <div class="card-footer">
                <button class="btn-guardar-moderno" onclick="guardarAsistencia()">
                    <span>Guardar Asistencia del Día</span>
                    <span class="icon">💾</span>
                </button>
            </div>
        </div>
    </div>
<script src="script.js"></script>
</body>
</html>
